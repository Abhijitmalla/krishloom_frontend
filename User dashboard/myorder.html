<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en-US" lang="en-US">
<head>
    <meta charset="utf-8">
    <title>My Orders – Krishloom Vastram</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="assets/fonts/fonts.css">
    <link rel="stylesheet" href="assets/icon:icomoon/style.css">
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.8.2/css/all.css">
    <link rel="shortcut icon" href="assets/images/logo/favicon.png">
    <style>
        /* ── Brand Tokens ── */
        :root {
            --brand: rgb(172, 43, 64);
            --brand-dark: rgb(119, 5, 41);
            --brand-light: rgba(172, 43, 64, 0.08);
            --surface: #fff;
            --bg: #f7f4f5;
            --text: #1a1a1a;
            --muted: #6c6c6c;
            --border: #e8dde0;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 16px rgba(172, 43, 64, .08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
        }

        /* ── Page layout ── */
        .page-wrapper {
            max-width: 1320px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* ── Summary stats cards ── */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .summary-card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .summary-icon {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .summary-icon.total {
            background: var(--brand-light);
            color: var(--brand);
        }

        .summary-icon.active {
            background: #ebf5fb;
            color: #1a5276;
        }

        .summary-icon.done {
            background: #eafaf1;
            color: #1e8449;
        }

        .summary-icon.returns {
            background: #fef9e7;
            color: #b7770d;
        }

        .summary-info p {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 3px;
        }

        .summary-info h5 {
            font-size: 20px;
            font-weight: 800;
            color: var(--text);
        }

        /* ── Filter bar ── */
        .filter-bar {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 14px;
            flex: 1;
            min-width: 200px;
            background: #fafafa;
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 13px;
            background: transparent;
            width: 100%;
            color: var(--text);
        }

        .search-box i {
            color: var(--muted);
            font-size: 14px;
        }

        .filter-tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }

        .filter-tab:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .filter-tab.active {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }

        .sort-select {
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text);
            outline: none;
            background: #fafafa;
            cursor: pointer;
        }

        .sort-select:focus {
            border-color: var(--brand);
        }

        /* ── TABLE ── */
        .orders-table-wrap {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        .orders-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1000px;
        }

        .orders-table thead {
            background: var(--brand-light);
            border-bottom: 2px solid var(--brand);
        }

        .orders-table thead th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: var(--brand-dark);
            white-space: nowrap;
        }

        .orders-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .orders-table tbody tr:hover {
            background: var(--brand-light);
        }

        .orders-table tbody td {
            padding: 14px 16px;
            vertical-align: middle;
            color: var(--text);
        }

        .orders-table .order-id {
            font-weight: 700;
            color: var(--brand);
        }

        .orders-table .product-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .orders-table .product-thumb-sm {
            width: 44px;
            height: 56px;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .orders-table .product-thumb-sm img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .orders-table .product-name {
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
        }

        .status-pill-sm {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 20px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .status-pill-sm::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .s-delivered {
            background: #eafaf1;
            color: #1e8449;
        }
        .s-delivered::before {
            background: #1e8449;
        }
        .s-processing {
            background: #fef9e7;
            color: #b7770d;
        }
        .s-processing::before {
            background: #b7770d;
        }
        .s-shipped {
            background: #ebf5fb;
            color: #1a5276;
        }
        .s-shipped::before {
            background: #1a5276;
        }
        .s-cancelled {
            background: #fdf0f0;
            color: #c0392b;
        }
        .s-cancelled::before {
            background: #c0392b;
        }
        .s-returned {
            background: #f4ecfb;
            color: #7d3c98;
        }
        .s-returned::before {
            background: #7d3c98;
        }

        .table-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .btn-icon-sm {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
        }

        .btn-icon-sm:hover {
            border-color: var(--brand);
            color: var(--brand);
            background: var(--brand-light);
        }

        .btn-icon-sm.primary {
            background: var(--brand);
            color: #fff;
            border-color: var(--brand);
        }

        .btn-icon-sm.primary:hover {
            background: var(--brand-dark);
            border-color: var(--brand-dark);
        }

        .btn-icon-sm.danger {
            color: #c0392b;
            border-color: #f5d0d0;
        }

        .btn-icon-sm.danger:hover {
            background: #fdf0f0;
            border-color: #c0392b;
        }

        .attachment-link {
            font-size: 12px;
            color: var(--brand);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .attachment-link:hover {
            text-decoration: underline;
        }

        .utr-code {
            font-family: monospace;
            font-size: 12px;
            background: #f5f5f5;
            padding: 2px 8px;
            border-radius: 12px;
            color: var(--muted);
        }

        .empty-state {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 64px 24px;
            text-align: center;
            display: none;
        }

        .empty-state.visible {
            display: block;
        }

        .empty-state i {
            font-size: 56px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-state h5 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 24px;
        }

        .btn-shop {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--brand);
            color: #fff;
            padding: 12px 28px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 700;
            text-decoration: none;
        }

        .btn-shop:hover {
            background: var(--brand-dark);
            color: #fff;
        }

        .pagination-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 14px 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pagination-info {
            font-size: 13px;
            color: var(--muted);
        }

        .pagination-btns {
            display: flex;
            gap: 6px;
        }

        .page-btn {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover {
            border-color: var(--brand);
            color: var(--brand);
        }

        .page-btn.active {
            background: var(--brand);
            border-color: var(--brand);
            color: #fff;
        }

        .page-btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* ── Toast ── */
        #toast {
            display: none;
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 9999;
            background: #1a1a1a;
            color: #fff;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            border-left: 4px solid rgb(172, 43, 64);
            box-shadow: 0 4px 20px rgba(0, 0, 0, .2);
        }

        /* ── Responsive ── */
        @media (max-width: 1024px) {
            .summary-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 640px) {
            .summary-row {
                grid-template-columns: 1fr 1fr;
            }
            .filter-bar {
                flex-direction: column;
                align-items: stretch;
            }
        }

        @media (max-width: 480px) {
            .summary-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">

        <!-- ─── STATS CARDS ─── -->
        <div class="summary-row">
            <div class="summary-card">
                <div class="summary-icon total"><i class="fas fa-shopping-bag"></i></div>
                <div class="summary-info">
                    <p>Total Orders</p>
                    <h5>12</h5>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon active"><i class="fas fa-truck"></i></div>
                <div class="summary-info">
                    <p>Active</p>
                    <h5>3</h5>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon done"><i class="fas fa-check-circle"></i></div>
                <div class="summary-info">
                    <p>Delivered</p>
                    <h5>8</h5>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon returns"><i class="fas fa-undo"></i></div>
                <div class="summary-info">
                    <p>Returns</p>
                    <h5>2</h5>
                </div>
            </div>
        </div>

        <!-- ─── FILTER BAR ─── -->
        <div class="filter-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search by order ID or product…" id="searchInput" oninput="filterOrders()">
            </div>
            <div class="filter-tabs" id="filterTabs">
                <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
                <button class="filter-tab" onclick="setFilter('processing', this)">Processing</button>
                <button class="filter-tab" onclick="setFilter('shipped', this)">Shipped</button>
                <button class="filter-tab" onclick="setFilter('delivered', this)">Delivered</button>
                <button class="filter-tab" onclick="setFilter('cancelled', this)">Cancelled</button>
                <button class="filter-tab" onclick="setFilter('returned', this)">Returned</button>
            </div>
            <select class="sort-select" id="sortSelect" onchange="filterOrders()">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="high">Amount: High to Low</option>
                <option value="low">Amount: Low to High</option>
            </select>
        </div>

        <!-- ─── TABLE ─── -->
        <div class="orders-table-wrap" id="ordersTableWrap">
            <table class="orders-table" id="ordersTable">
                <thead>
                    <tr>
                        <th>Order</th>
                        <th>Add Review</th>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Total</th>
                        <th>UTR No.</th>
                        <th>Attachment</th>
                        <th>Track Order</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- rows injected by JS -->
                </tbody>
            </table>
        </div>

        <!-- ─── EMPTY STATE ─── -->
        <div class="empty-state" id="emptyState">
            <i class="fas fa-box-open"></i>
            <h5>No orders found</h5>
            <p>Try changing the search or filter.</p>
            <a href="shop.html" class="btn-shop"><i class="fas fa-shopping-bag"></i> Start Shopping</a>
        </div>

        <!-- ─── PAGINATION ─── -->
        <div class="pagination-row">
            <p class="pagination-info">Showing <strong id="showingCount">1–5</strong> of <strong id="totalCount">12</strong> orders</p>
            <div class="pagination-btns">
                <button class="page-btn" disabled><i class="fas fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

    </div>

    <!-- ─── TOAST ─── -->
    <div id="toast"></div>

    <script>
        // ── DATA ──
        const ordersData = [
            { order: 'Kanjivaram Silk', review: true, id: '#KV-2041', date: '12 Jun 2026', status: 'delivered', total: '₹4,299', utr: 'UTRX8273', attachment: 'invoice.pdf', track: true },
            { order: 'Cotton Handloom + Linen', review: false, id: '#KV-2038', date: '5 Jun 2026', status: 'shipped', total: '₹2,598', utr: 'UTRX8912', attachment: 'tracking.pdf', track: true },
            { order: 'Bridal Organza Silk', review: false, id: '#KV-2031', date: '28 May 2026', status: 'processing', total: '₹7,499', utr: '—', attachment: null, track: true },
            { order: 'Linen Kurti Set', review: true, id: '#KV-2019', date: '10 May 2026', status: 'delivered', total: '₹1,199', utr: 'UTRX4531', attachment: 'invoice.pdf', track: true },
            { order: 'Cotton Silk Saree', review: false, id: '#KV-1998', date: '20 Apr 2026', status: 'cancelled', total: '₹2,299', utr: 'REFUNDED', attachment: null, track: false }
        ];

        const statusMap = {
            delivered: 'Delivered',
            shipped: 'Shipped',
            processing: 'Processing',
            cancelled: 'Cancelled',
            returned: 'Returned'
        };

        let currentFilter = 'all';
        let currentSearch = '';

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            if (data.length === 0) {
                document.getElementById('emptyState').classList.add('visible');
                document.getElementById('ordersTableWrap').style.display = 'none';
                document.getElementById('showingCount').textContent = '0';
                document.getElementById('totalCount').textContent = '0';
                return;
            }
            document.getElementById('emptyState').classList.remove('visible');
            document.getElementById('ordersTableWrap').style.display = 'block';

            data.forEach((item) => {
                const statusClass = 's-' + item.status;
                const statusLabel = statusMap[item.status] || item.status;

                const reviewIcon = item.review
                    ? `<button class="btn-icon-sm" onclick="showToast('Write review for ${item.id}')" title="Add review"><i class="fas fa-star" style="color:var(--brand)"></i></button>`
                    : `<span style="color:var(--muted); font-size:12px;">—</span>`;

                const attachHtml = item.attachment
                    ? `<a href="#" class="attachment-link"><i class="fas fa-paperclip"></i> ${item.attachment}</a>`
                    : `<span style="color:var(--muted); font-size:12px;">—</span>`;

                const trackHtml = item.track
                    ? `<button class="btn-icon-sm" onclick="showToast('Tracking for ${item.id}')" title="Track"><i class="fas fa-map-marker-alt"></i></button>`
                    : `<span style="color:var(--muted); font-size:12px;">—</span>`;

                const actionHtml = `
                    <div class="table-actions">
                        <button class="btn-icon-sm" onclick="showToast('Reorder ${item.id}')" title="Reorder"><i class="fas fa-redo"></i></button>
                        <button class="btn-icon-sm primary" onclick="showToast('Invoice ${item.id}')" title="Invoice"><i class="fas fa-file-invoice"></i></button>
                        ${item.status === 'processing' ? `<button class="btn-icon-sm danger" onclick="showToast('Cancel ${item.id}')" title="Cancel"><i class="fas fa-times"></i></button>` : ''}
                    </div>
                `;

                const tr = document.createElement('tr');
                tr.dataset.status = item.status;
                tr.dataset.search = (item.order + ' ' + item.id).toLowerCase();
                tr.innerHTML = `
                    <td>
                        <div class="product-cell">
                            <div class="product-thumb-sm"><img src="assets/images/collection/saree2.jpeg" alt="${item.order}"></div>
                            <span class="product-name">${item.order}</span>
                        </div>
                    </td>
                    <td>${reviewIcon}</td>
                    <td><span class="order-id">${item.id}</span></td>
                    <td>${item.date}</td>
                    <td><span class="status-pill-sm ${statusClass}">${statusLabel}</span></td>
                    <td><strong>${item.total}</strong></td>
                    <td><span class="utr-code">${item.utr}</span></td>
                    <td>${attachHtml}</td>
                    <td>${trackHtml}</td>
                    <td>${actionHtml}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalCount').textContent = data.length;
            document.getElementById('showingCount').textContent = `1–${data.length}`;
        }

        function filterOrders() {
            currentSearch = document.getElementById('searchInput').value.toLowerCase();
            const sort = document.getElementById('sortSelect').value;
            let filtered = ordersData.filter(item => {
                const matchStatus = currentFilter === 'all' || item.status === currentFilter;
                const searchText = (item.order + ' ' + item.id).toLowerCase();
                const matchSearch = !currentSearch || searchText.includes(currentSearch);
                return matchStatus && matchSearch;
            });

            if (sort === 'newest') filtered.sort((a, b) => b.date.localeCompare(a.date));
            else if (sort === 'oldest') filtered.sort((a, b) => a.date.localeCompare(b.date));
            else if (sort === 'high') filtered.sort((a, b) => parseFloat(b.total.replace(/[^0-9.]/g, '')) - parseFloat(a.total.replace(/[^0-9.]/g, '')));
            else if (sort === 'low') filtered.sort((a, b) => parseFloat(a.total.replace(/[^0-9.]/g, '')) - parseFloat(b.total.replace(/[^0-9.]/g, '')));

            renderTable(filtered);
        }

        function setFilter(status, btn) {
            currentFilter = status;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            filterOrders();
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            t.style.opacity = '1';
            setTimeout(() => { t.style.transition = 'opacity .4s'; t.style.opacity = '0'; }, 2500);
            setTimeout(() => { t.style.display = 'none'; t.style.transition = ''; }, 3000);
        }

        // init
        renderTable(ordersData);
    </script>

</body>
</html>
